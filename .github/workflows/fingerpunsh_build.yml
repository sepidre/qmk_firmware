name: Build fingerpunch User firmware
on:
  push:
    branches:
      - main
      - master
      - 'develop**'
      - github-actions-build
jobs:
  gather-keyboards:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@v3
      with:
        repository: ${{ github.repository}}
        ref: ${{ github.ref }}
    - id: set-matrix
      run: |
          content=$(bash bin/fp_build.sh -l | sed s~keyboards/fingerpunch/~~|  jq -Rsc '. / "\n" - [""]')
          content="{\"keyboard\":$content}"
          echo "matrix=$content" >> $GITHUB_OUTPUTS


  Build:
    needs: gather-keyboards
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.gather-keyboards.outputs.matrix)}}
    steps:
      - name: Checkout QMK
        uses: actions/checkout@v3
        with:
          repository: ${{ github.repository}}
          ref: ${{ github.ref }}
          submodules: recursive

      - name: Build User firmware
        id: userbuild
        shell: bash
        run: |
          wget -q https://github.com/stedolan/jq/releases/download/jq-1.5/jq-linux64 -O jq
          chmod +x jq
          mv jq /usr/local/sbin/

          echo "Building keyboard {{ matrix.keyboard }} for user ${{ github.actor }} "
          make_command="bin/fp_build.sh -k {{ matrix.keyboard }} -m ${{ github.actor }} -r"
          echo "${make_command}"
          $make_command

          done
        continue-on-error: true

      - name: Build Default if no User firmware
        id: defaultbuild
        shell: bash
        if: steps.userbuild.outcome != 'success'
        run: |
          wget -q https://github.com/stedolan/jq/releases/download/jq-1.5/jq-linux64 -O jq
          chmod +x jq
          mv jq /usr/local/sbin/

          echo "Building keyboard {{ matrix.keyboard }} default firmware"
          make_command="bin/fp_build.sh -k ${line} -r"
          echo "${make_command}"
          $make_command

          done
        continue-on-error: true

      - name: Archive firmware
        uses: actions/upload-artifact@v3
        continue-on-error: true
        with:
          name: qmk_fingerpunch_${{ github.actor }}
          path: |
            *.hex
            *.bin
            *.uf2

